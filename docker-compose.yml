name: picky

services:
  postgres:
    image: postgres:17
    container_name: postgres
    restart: on-failure
    hostname: postgres
    domainname: postgres.picky.local
    environment:
      - POSTGRES_USER=picky
      - POSTGRES_PASSWORD=Password123
      - POSTGRES_DB=primary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_database.sh:/docker-entrypoint-initdb.d/init_database.sh:ro
    networks:
      picky-network:
        aliases:
          - postgres.picky.local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U picky -d primary"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: on-failure
    hostname: qdrant
    domainname: qdrant.picky.local
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      picky-network:
        aliases:
          - qdrant.picky.local
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "exec 3<>/dev/tcp/localhost/6333 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  dagster-webserver:
    container_name: dagster-webserver
    restart: on-failure
    hostname: dagster-webserver
    domainname: dagster.picky.local
    build:
      context: .
      dockerfile: services/dagster/Dockerfile
    environment:
      - DAGSTER_POSTGRES_URL=postgresql://picky:Password123@postgres.picky.local:5432/dagster
    entrypoint:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - workspace.yaml
    expose:
      - "3000"
    ports:
      - "3009:3000"
    volumes:
      - dagster_storage:/opt/dagster/dagster_home/storage
    depends_on:
      postgres:
        condition: service_healthy
      picky-recs:
        condition: service_healthy
    networks:
      picky-network:
        aliases:
          - dagster.picky.local
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://localhost:3000/'')" || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: on-failure
    hostname: minio
    domainname: minio.picky.local
    environment:
      - MINIO_ROOT_USER=picky
      - MINIO_ROOT_PASSWORD=Password123
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      picky-network:
        aliases:
          - minio.picky.local
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  picky-recs:
    container_name: picky-recs
    restart: on-failure
    hostname: picky-recs
    domainname: picky-recs.picky.local
    build:
      context: .
      dockerfile: services/picky-recs/Dockerfile
    env_file:
      - ./services/picky-recs/.env
    environment:
      - DAGSTER_POSTGRES_URL=postgresql://picky:Password123@postgres.picky.local:5432/dagster
    volumes:
      - ./services/picky-recs/picky_recs:/opt/dagster/app/services/picky-recs/picky_recs
      - ./services/picky-recs/definitions.py:/opt/dagster/app/services/picky-recs/definitions.py
    expose:
      - "4000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      picky-network:
        aliases:
          - picky-recs.picky.local
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "uv run dagster api grpc-health-check -p 4000",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  dagster-daemon:
    container_name: dagster-daemon
    restart: on-failure
    hostname: dagster-daemon
    build:
      context: .
      dockerfile: services/dagster/Dockerfile
    environment:
      - DAGSTER_POSTGRES_URL=postgresql://picky:Password123@postgres.picky.local:5432/dagster
    entrypoint:
      - dagster-daemon
      - run
    volumes:
      - dagster_storage:/opt/dagster/dagster_home/storage
    depends_on:
      postgres:
        condition: service_healthy
      dagster-webserver:
        condition: service_healthy
      picky-recs:
        condition: service_healthy
    networks:
      - picky-network

volumes:
  postgres_data:
  qdrant_data:
  mongodb_data:
  dagster_storage:
  minio_data:

networks:
  picky-network:
    name: picky-network
    driver: bridge
